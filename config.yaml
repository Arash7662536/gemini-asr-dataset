# All paths may be absolute; defaults assume the repo sits next to part_2.
paths:
  audio_dir: /workspace/DG-Pay-cc/part2
  work_dir: ./work

runtime:
  num_workers: null      # CPU workers for stages 1-2 (null = cpu_count - 1)
  device: auto           # auto | cuda | cpu  (stages 4-5)

# ---- stage 1: manifest / leg pairing ---------------------------------------
stage1:
  min_call_dur: 10.0     # s, drop calls whose longest leg is shorter
  silent_rms: 0.0005     # legs below this RMS are flagged silent (skipped in stage 2)
  env_corr_max: 0.95     # r/t envelope correlation above this = duplicated mix -> drop

# ---- stage 2: VAD segmentation + bleed filter -------------------------------
stage2:
  vad:
    threshold: 0.5
    min_speech_duration_ms: 250
    min_silence_duration_ms: 300
    speech_pad_ms: 30
  max_merge_gap: 1.0            # s, max silence between merged speech regions
  max_chunk_dur: 28.0           # s, keep below Whisper's 30 s window
  min_chunk_dur: 3.0            # s, no tiny chunks — shorter groups are dropped
  boundary_pad: 0.2             # s of context kept around VAD speech edges
  min_speech_coverage: 0.35     # VAD speech fraction inside the chunk
  bleed_db_min: 0.0             # chunk speech must be >= this many dB above the
                                # other leg over the same samples, else it is echo

# ---- stage 3: Gemini transcription via OpenRouter ---------------------------
openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  model: google/gemini-3.5-flash
  temperature: 0.0
  max_tokens: 1024
  concurrency: 8                # parallel in-flight requests (no batch API exists)
  timeout_s: 180
  max_retries: 6
  reasoning:                    # gemini-3.5-flash REQUIRES reasoning — it cannot
    effort: low                 # be turned off, only minimized. low effort keeps
                                # the reasoning output-token cost down. Set the
                                # whole block to null to send no reasoning field
                                # (model then uses its default, likely pricier).
  provider: null                # e.g. {order: [google-vertex], allow_fallbacks: true}
  extra_body: null              # raw fields merged into every request body
  max_cost_usd: 80.0            # hard stop for stage 3; it resumes after a top-up
  prices_per_mtok:              # fallback estimate when the API omits usage.cost
    audio: 3.0                  # gemini-3.5-flash audio input  $/M tokens
    prompt: 1.5                 #                  text input   $/M tokens
    completion: 9.0             #                  output       $/M tokens
  system_prompt: |
    You are a precise transcriber of Persian (Farsi) telephone call-center audio.
    The clip is ONE side of a call: a single speaker, 16 kHz telephony quality.
    Rules:
    - Transcribe VERBATIM what the speaker says, in Persian script.
    - Keep colloquial/spoken forms exactly as pronounced (e.g. «می‌تونم», «بذارید»);
      do NOT rewrite them into formal Persian.
    - Keep fillers, hesitations and repetitions the speaker actually says
      (e.g. «اِ», «خب», «یعنی»).
    - Write numbers in words exactly as spoken (e.g. «دویست و سی و چهار»),
      not as digits.
    - A faint background voice may be audible (echo of the other party).
      Ignore it completely — transcribe only the dominant, near speaker.
    - If the clip contains no intelligible speech from the near speaker
      (silence, noise, hold music, only faint echo), output exactly: [NO_SPEECH]
    - Output ONLY the transcript text. No quotes, labels, timestamps,
      translations or commentary.
  user_prompt: "Transcribe this audio clip."

# ---- stage 4: CTC forced alignment -------------------------------------------
stage4:
  language: fas        # ISO 639-3 for Persian
  batch_size: 4

# ---- stage 5: rescue of low-alignment chunks --------------------------------
stage5:
  trigger_align_score: 0.45     # rescue chunks whose mean word confidence is below
  trigger_min_word: 0.05        # ... or whose weakest word is below
  edge_conf: 0.20               # edge word below this -> suspected boundary clip
  expand_s: 1.0                 # s of extra context per suspected-clipped side
  temperature: 0.5              # retry pass samples (self-consistency needs variance)
  model: null                   # null = same as openrouter.model; set e.g.
                                # google/gemini-3.5-pro for a stronger tiebreaker
  max_cost_usd: 30.0             # budget for the retry pass only

# ---- stage 6: final filtering + Arrow build ----------------------------------
stage6:
  filters:
    ctc_align_score_min: 0.40     # mean per-word CTC alignment confidence
    ctc_align_min_word_min: 0.05  # weakest word must clear this
    retry_cer_max: null           # optional: cap label/retry divergence (rescued rows)
    snr_db_min: 3.0               # null disables
    bleed_db_min: null            # stage 2 already filtered; refine here if needed
    min_duration: 3.0
    max_duration: 29.0
    min_char_rate: 2.5            # normalized chars (no spaces) per second
    max_char_rate: 26.0
    max_latin_ratio: 0.2
    drop_repetition: true         # n-gram loops = hallucination shape
  trim_to_alignment: true   # cut rows to [first_word - pad, last_word + pad]
  trim_pad: 0.15
  split_by: extension       # extension | call  (extension = agent seat, no
                            # agent voice leaks across splits; ~tens of seats)
  val_frac: 0.03
  test_frac: 0.03
  seed_salt: v1
